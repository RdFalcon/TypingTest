<script>
    const container = document.querySelector("#letters-container");
const chars = "अ आ इ ई उ ऊ ऋ ए ऐ ओ औ अं अः क ख J K L M N O P Q R S T U V W X Y ग घ ङ च छ ज झ ञ ट ठ ड ढ ण त थ द ध न प फ ब भ म य र ल व श ष स ह क्ष त्र ज्ञ  A B C D E F G H I Z";

function createLetter() {
    const letter = document.createElement("span");
    letter.classList.add("letter");

    letter.textContent = chars[Math.floor(Math.random() * chars.length)];
    const colors=["red","green","yellow","purple","orange","Blue","Aqua"];
    letter.style.color=colors[Math.floor(Math.random()*colors.length)];
    // letter.style.left = Math.random() * 30 + "vw";
    letter.style.right = Math.random() * 30 + "vw";
    letter.style.fontSize = Math.random() * 20 + 30 + "px";
    letter.style.animationDuration = Math.random() * 3 + 5 + "s";

    container.appendChild(letter);

    setTimeout(function(){ 
        letter.remove();
    }, 6000);
}
