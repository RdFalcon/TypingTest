<script> 




let time=JSON.parse(localStorage.getItem('storedtime'));
console.log("here is time",time);
let righ2=JSON.parse(localStorage.getItem('continueright'));
let wrong2=JSON.parse(localStorage.getItem('continuewrong'));
//let runtime= 5;// right now i cannot do with live time may be later on live time will be calculated
let sum=righ2+wrong2;


console.log("total words types is",sum);
document.querySelector(".correct").firstChild.textContent=sum;


let totaltyped=righ2+wrong2;
let netwpm = time>0 ?(totaltyped-wrong2)/(5*time):0;
let accuracy= totaltyped=== 0 ? "0 %": Math.floor((righ2/totaltyped)*100)+ "% ";

document.querySelector('.final').firstChild.textContent=Math.floor(netwpm);
